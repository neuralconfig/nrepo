name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Verify standalone bundle
        run: |
          if grep -q '@neuralrepo/shared' dist/index.js; then
            echo "ERROR: @neuralrepo/shared not bundled"
            exit 1
          fi

      - name: Publish
        run: npm publish --access public --provenance
